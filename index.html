<!DOCTYPE html>
<html lang="uk">
<head>

            margin-bottom: 20px;
            display: block;
        }

            margin: 0 0 10px 0;
            font-size: 2rem;
            color: #1a1a1a;
        }

        .status {
            display: inline-block;
            margin-top: 20px;
